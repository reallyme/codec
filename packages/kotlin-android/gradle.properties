org.gradle.dependency.verification=strict

# Release-minified consumer validation loads the Android lint model, R8, and
# the complete generated protobuf surface in one Gradle invocation. Pin an
# explicit package-local ceiling so the audit gate does not inherit Gradle's
# insufficient default metaspace or a developer-specific global setting.
org.gradle.jvmargs=-Xmx1g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
