name: Crates.io Release

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Optional exact main commit SHA. Leave blank to use the current origin/main SHA.
        required: false
        type: string
        default: ""
      publish:
        description: Publish crates to crates.io after the dry run succeeds
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: crates-release-${{ inputs.release_sha || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-release-sha:
    name: Verify audited release SHA
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release SHA
        id: resolve-release-sha
        env:
          RELEASE_SHA_INPUT: ${{ inputs.release_sha }}
        run: |
          git fetch --no-tags origin main
          if [ -n "${RELEASE_SHA_INPUT}" ]; then
            if [[ ! "${RELEASE_SHA_INPUT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::release_sha must be blank or a lowercase 40-character commit SHA"
              exit 1
            fi
            release_sha="${RELEASE_SHA_INPUT}"
          else
            release_sha="$(git rev-parse origin/main)"
          fi
          if [ "$(git rev-parse origin/main)" != "${release_sha}" ]; then
            echo "::error::resolved release SHA is not the current origin/main tip"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_SHA=${release_sha}" >> "${GITHUB_ENV}"
          echo "Using release SHA ${release_sha}"

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Require current main and successful checks for exact SHA
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ steps.resolve-release-sha.outputs.release_sha }}
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
        run: node scripts/verify_release_attestation.mjs

  dry-run:
    name: crates.io publish preflight
    needs: verify-release-sha
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Inspect publishable crate tarballs
        run: node scripts/publish_crates_in_order.mjs inspect

  publish:
    name: publish crates
    needs: [verify-release-sha, dry-run]
    if: inputs.publish == true
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish crates in dependency order
        run: |
          node scripts/verify_release_attestation.mjs
          node scripts/publish_crates_in_order.mjs publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
