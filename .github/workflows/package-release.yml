name: Package Release

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Optional exact main commit SHA. Leave blank to use the current origin/main SHA.
        required: false
        type: string
        default: ""
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.1.22
      publish_swift:
        description: Create the SwiftPM GitHub release and upload the xcframework
        required: true
        type: boolean
        default: false
      publish_maven:
        description: Publish the JVM jar and Android AAR to Maven
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: package-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-release-sha:
    name: Verify audited release SHA
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release SHA
        id: resolve-release-sha
        env:
          RELEASE_SHA_INPUT: ${{ inputs.release_sha }}
        run: |
          git fetch --no-tags origin main
          if [ -n "${RELEASE_SHA_INPUT}" ]; then
            if [[ ! "${RELEASE_SHA_INPUT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::release_sha must be blank or a lowercase 40-character commit SHA"
              exit 1
            fi
            release_sha="${RELEASE_SHA_INPUT}"
          else
            release_sha="$(git rev-parse origin/main)"
          fi
          if [ "$(git rev-parse origin/main)" != "${release_sha}" ]; then
            echo "::error::resolved release SHA is not the current origin/main tip"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_SHA=${release_sha}" >> "${GITHUB_ENV}"
          echo "Using release SHA ${release_sha}"

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Require current main and successful checks for exact SHA
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ steps.resolve-release-sha.outputs.release_sha }}
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
        run: node scripts/verify_release_attestation.mjs

  swift-artifact:
    name: Swift xcframework
    needs: verify-release-sha
    if: inputs.publish_maven == false || inputs.publish_swift == true
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Build SwiftPM binary artifact
        run: scripts/build_swift_xcframework.sh

      - name: Upload Swift artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swift-xcframework
          path: |
            build/swift/ReallyMeCodecFFI.xcframework.zip
            build/swift/ReallyMeCodecFFI.xcframework.checksum
          if-no-files-found: error

  jvm-native:
    name: JVM native ${{ matrix.platform }}
    needs: verify-release-sha
    if: inputs.publish_swift == false || inputs.publish_maven == true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-15
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Build native resource
        shell: bash
        run: scripts/build_kotlin_native_resource.sh build/kotlin-native-resources

      - name: Write host native integrity metadata
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources build/kotlin-native-resources/me/really/codec/native/native-manifest.json
        shell: bash

      - name: Test host native loader
        working-directory: packages/kotlin
        run: ./gradlew test -Preallyme.codec.nativeResourcesDir=../../build/kotlin-native-resources
        shell: bash

      - name: Upload native resource
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-native-${{ matrix.platform }}
          path: build/kotlin-native-resources
          if-no-files-found: error

  maven-package:
    name: Maven package with bundled JNI
    needs: [verify-release-sha, jvm-native]
    if: inputs.publish_swift == false || inputs.publish_maven == true
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Download native resources
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kotlin-native-*
          path: build/kotlin-native-resources
          merge-multiple: true

      - name: Write native checksum manifest
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources build/kotlin-native-resources/me/really/codec/native/native-manifest.json

      - name: Test and package Maven artifact
        working-directory: packages/kotlin
        run: ./gradlew test publishToMavenLocal -Preallyme.codec.nativeResourcesDir=${{ github.workspace }}/build/kotlin-native-resources -Preallyme.codec.requireFullNativeResources=true

      - name: Publish Maven artifact
        if: inputs.publish_maven == true
        working-directory: packages/kotlin
        run: |
          node ../../scripts/verify_release_attestation.mjs
          ./gradlew publish -Preallyme.codec.nativeResourcesDir=${{ github.workspace }}/build/kotlin-native-resources
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
          REALLYME_MAVEN_REPOSITORY_URL: ${{ secrets.REALLYME_MAVEN_REPOSITORY_URL }}
          REALLYME_MAVEN_USERNAME: ${{ secrets.REALLYME_MAVEN_USERNAME }}
          REALLYME_MAVEN_PASSWORD: ${{ secrets.REALLYME_MAVEN_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}

  android-aar:
    name: Android AAR with bundled JNI
    needs: verify-release-sha
    if: inputs.publish_swift == false || inputs.publish_maven == true
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Android NDK
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865" >> "${GITHUB_ENV}"

      - name: Stage Android JNI libraries
        run: scripts/build_android_native_resources.sh build/android-jniLibs

      - name: Write Android native checksum manifest
        run: node scripts/write_native_manifest.mjs build/android-jniLibs build/android-native-assets/reallyme-codec/native-manifest.json

      - name: Build Android AAR
        run: packages/kotlin/gradlew -p packages/kotlin-android bundleReleaseAar verifyReleaseAarContainsJniLibs -Preallyme.codec.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs -Preallyme.codec.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets -Preallyme.codec.requireAndroidJniLibs=true

      - name: Publish Android AAR
        if: inputs.publish_maven == true
        run: |
          node scripts/verify_release_attestation.mjs
          packages/kotlin/gradlew -p packages/kotlin-android publish -Preallyme.codec.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs -Preallyme.codec.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets -Preallyme.codec.requireAndroidJniLibs=true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
          REALLYME_MAVEN_REPOSITORY_URL: ${{ secrets.REALLYME_MAVEN_REPOSITORY_URL }}
          REALLYME_MAVEN_USERNAME: ${{ secrets.REALLYME_MAVEN_USERNAME }}
          REALLYME_MAVEN_PASSWORD: ${{ secrets.REALLYME_MAVEN_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}

  swift-release:
    name: SwiftPM release tag
    needs: [verify-release-sha, swift-artifact]
    if: inputs.publish_swift == true
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}
          fetch-depth: 0

      - name: Download Swift artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: swift-xcframework
          path: build/swift

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Verify SwiftPM manifest
        run: |
          node scripts/verify_swift_release_artifact.mjs build/swift/ReallyMeCodecFFI.xcframework.zip build/swift/ReallyMeCodecFFI.xcframework.checksum Package.swift "${RELEASE_VERSION}"
          node scripts/run_pinned_release_readiness.mjs --release-packages
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Create immutable GitHub release with Swift artifact
        run: |
          node scripts/verify_release_attestation.mjs
          if gh release view "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "::error::GitHub release v${RELEASE_VERSION} already exists"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "::error::Git tag v${RELEASE_VERSION} already exists"
            exit 1
          fi
          gh release create "v${RELEASE_VERSION}" build/swift/ReallyMeCodecFFI.xcframework.zip --target "${RELEASE_SHA}" --title "ReallyMe Codec v${RELEASE_VERSION}" --notes "ReallyMe Codec package release v${RELEASE_VERSION}."
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
          RELEASE_VERSION: ${{ inputs.version }}
