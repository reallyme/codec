name: Swift Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.2.0

permissions:
  contents: read

concurrency:
  group: swift-package-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-release-sha:
    name: Verify reviewed release SHA
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve current release SHA
        id: resolve-release-sha
        run: |
          git fetch --no-tags origin main
          release_sha="$(git rev-parse origin/main)"
          if [ "$(git rev-parse origin/main)" != "${release_sha}" ]; then
            echo "::error::resolved release SHA is not the current origin/main tip"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_SHA=${release_sha}" >> "${GITHUB_ENV}"
          echo "Using release SHA ${release_sha}"

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Require current main and successful Swift package checks
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ steps.resolve-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: swift-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
        run: node scripts/verify_release_attestation.mjs

  swift-artifact:
    name: Swift xcframework
    needs: verify-release-sha
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Select Xcode 26.4 for Swift artifact
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app
          swift --version

      - name: Build SwiftPM binary artifact
        run: scripts/build_swift_xcframework.sh

      - name: Upload Swift artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: swift-xcframework
          path: |
            build/swift/ReallyMeCodecFFI.xcframework.zip
            build/swift/ReallyMeCodecFFI.xcframework.checksum
          if-no-files-found: error

  swift-verify:
    name: SwiftPM artifact verification
    needs: [verify-release-sha, swift-artifact]
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}

      - name: Download Swift artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: swift-xcframework
          path: build/swift

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Select Xcode 26.4 for Swift verification
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app
          swift --version

      - name: Verify SwiftPM manifest
        run: |
          node scripts/verify_swift_release_artifact.mjs build/swift/ReallyMeCodecFFI.xcframework.zip build/swift/ReallyMeCodecFFI.xcframework.checksum Package.swift "${RELEASE_VERSION}"
          node scripts/run_pinned_release_readiness.mjs --release-packages
        env:
          RELEASE_VERSION: ${{ inputs.version }}

  swift-release:
    name: SwiftPM release tag
    needs: [verify-release-sha, swift-artifact, swift-verify]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-release-sha.outputs.release_sha }}
          fetch-depth: 0

      - name: Download Swift artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: swift-xcframework
          path: build/swift

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Create immutable GitHub release with Swift artifact
        run: |
          node scripts/verify_release_attestation.mjs
          if gh release view "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "::error::GitHub release v${RELEASE_VERSION} already exists"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "::error::Git tag v${RELEASE_VERSION} already exists"
            exit 1
          fi
          gh release create "v${RELEASE_VERSION}" build/swift/ReallyMeCodecFFI.xcframework.zip --target "${RELEASE_SHA}" --title "ReallyMe Codec v${RELEASE_VERSION}" --notes "ReallyMe Codec package release v${RELEASE_VERSION}."
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ needs.verify-release-sha.outputs.release_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_ATTESTATION_PREFLIGHT_WORKFLOW: swift-package-preflight.yml
          RELEASE_ATTESTATION_WAIT_SECONDS: "3600"
          RELEASE_ATTESTATION_POLL_SECONDS: "20"
