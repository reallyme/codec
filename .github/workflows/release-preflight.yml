name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Optional exact main commit SHA to certify. Leave blank to use current origin/main.
        required: false
        type: string
        default: ""
      version:
        description: Release version without leading v
        required: true
        type: string
        default: 0.1.22

permissions:
  contents: read

jobs:
  verify-source-sha:
    name: verify source SHA
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.resolve-release-sha.outputs.release_sha }}
    steps:
      - name: Checkout main for release SHA resolution
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release SHA
        id: resolve-release-sha
        env:
          RELEASE_SHA_INPUT: ${{ inputs.release_sha }}
        run: |
          git fetch --no-tags origin main
          if [ -n "${RELEASE_SHA_INPUT}" ]; then
            if [[ ! "${RELEASE_SHA_INPUT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::release_sha must be blank or a lowercase 40-character commit SHA"
              exit 1
            fi
            release_sha="${RELEASE_SHA_INPUT}"
          else
            release_sha="$(git rev-parse origin/main)"
          fi
          if [ "$(git rev-parse origin/main)" != "${release_sha}" ]; then
            echo "::error::resolved release SHA is not the current origin/main tip"
            exit 1
          fi
          git checkout --detach "${release_sha}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "Using release SHA ${release_sha}"

  rust-crates:
    name: rust crate metadata
    needs: verify-source-sha
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Check workspace metadata
        run: cargo metadata --format-version 1 --no-deps

      - name: Check codec crate tarball
        run: cargo package -p reallyme-codec --list

      - name: Check release readiness contract
        run: node scripts/run_pinned_release_readiness.mjs

  swift-package:
    name: swift package preflight
    needs: verify-source-sha
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          swift --version

      - name: Build codec FFI dylib
        run: cargo build --locked -p reallyme-codec-ffi

      - name: Test Swift package
        run: swift test
        env:
          REALLYME_CODEC_FFI_LIBRARY_PATH: ${{ github.workspace }}/target/debug/libreallyme_codec_ffi.dylib
          REALLYME_CODEC_SWIFTPM_RUNTIME_FFI: "1"

      - name: Build SwiftPM binary artifact
        run: scripts/build_swift_xcframework.sh

      - name: Verify SwiftPM binary manifest wiring
        run: |
          checksum="$(cat build/swift/ReallyMeCodecFFI.xcframework.checksum)"
          node scripts/prepare_swift_binary_manifest.mjs "${RELEASE_VERSION}" "${checksum}"
          node scripts/run_pinned_release_readiness.mjs --release-packages
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Prepare local SwiftPM binary manifest
        run: |
          checksum="$(cat build/swift/ReallyMeCodecFFI.xcframework.checksum)"
          node scripts/prepare_swift_binary_manifest.mjs "${RELEASE_VERSION}" "${checksum}" --local-artifact-path build/swift/ReallyMeCodecFFI.xcframework
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Reset SwiftPM package state
        run: swift package reset

      - name: Test Swift package with linked binary target
        run: swift test

  jvm-native:
    name: jvm native preflight ${{ matrix.platform }}
    needs: verify-source-sha
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-15
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Stage codec JNI resource
        run: scripts/build_kotlin_native_resource.sh build/kotlin-native-resources
        shell: bash

      - name: Write host native integrity metadata
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources build/kotlin-native-resources/me/really/codec/native/native-manifest.json
        shell: bash

      - name: Test host native loader
        working-directory: packages/kotlin
        run: ./gradlew test -Preallyme.codec.nativeResourcesDir=../../build/kotlin-native-resources
        shell: bash

      - name: Upload codec JNI resource
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-native-${{ matrix.platform }}
          path: build/kotlin-native-resources
          if-no-files-found: error

  kotlin-package:
    name: kotlin maven preflight
    needs: [verify-source-sha, jvm-native]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Download codec JNI resources
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kotlin-native-*
          path: build/kotlin-native-resources
          merge-multiple: true

      - name: Write native checksum manifest
        run: node scripts/write_native_manifest.mjs build/kotlin-native-resources build/kotlin-native-resources/me/really/codec/native/native-manifest.json

      - name: Test codec package and publish to Maven local
        working-directory: packages/kotlin
        run: ./gradlew test publishToMavenLocal -Preallyme.codec.nativeResourcesDir=${{ github.workspace }}/build/kotlin-native-resources -Preallyme.codec.requireFullNativeResources=true

  android-package:
    name: android aar preflight
    needs: verify-source-sha
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install Android NDK
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865" >> "${GITHUB_ENV}"

      - name: Stage Android JNI libraries
        run: scripts/build_android_native_resources.sh build/android-jniLibs

      - name: Write Android native checksum manifest
        run: node scripts/write_native_manifest.mjs build/android-jniLibs build/android-native-assets/reallyme-codec/native-manifest.json

      - name: Build Android AAR
        run: packages/kotlin/gradlew -p packages/kotlin-android bundleReleaseAar verifyReleaseAarContainsJniLibs -Preallyme.codec.androidJniLibsDir=${{ github.workspace }}/build/android-jniLibs -Preallyme.codec.androidNativeAssetsDir=${{ github.workspace }}/build/android-native-assets -Preallyme.codec.requireAndroidJniLibs=true

  npm-package:
    name: npm package preflight
    needs: verify-source-sha
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.verify-source-sha.outputs.release_sha }}

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-pack
        with:
          tool: wasm-pack@0.15.0

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # wasm-bindgen-cli
        with:
          tool: wasm-bindgen-cli@0.2.126

      - name: Install TypeScript codec package dependencies
        run: npm ci
        working-directory: packages/ts

      - name: Test TypeScript codec package
        run: npm test
        working-directory: packages/ts

      - name: Build codec npm tarball dry run
        run: npm pack --dry-run
        working-directory: packages/ts
