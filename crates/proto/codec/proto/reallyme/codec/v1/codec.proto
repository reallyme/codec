syntax = "proto3";

package reallyme.codec.v1;

option java_multiple_files = true;
option java_package = "me.really.codec.v1";
option swift_prefix = "ReallyMeProto";

// CodecError is the public, non-PII error envelope for codec boundary failures.
// The oneof keeps base encoding, PEM, multiformat, and canonicalization
// failures distinct while the shared CodecErrorReason enum provides stable
// cross-language reason codes.
message CodecError {
  oneof error {
    CodecBaseEncodingError base_encoding = 1;
    CodecPemError pem = 2;
    CodecMultiformatError multiformat = 3;
    CodecCanonicalizationError canonicalization = 4;
    CodecBackendError backend = 5;
    CodecBoundaryError boundary = 6;
  }
}

// CodecProtoResultStatus identifies the protobuf message carried by the
// result-envelope payload.
enum CodecProtoResultStatus {
  CODEC_PROTO_RESULT_STATUS_UNSPECIFIED = 0;
  CODEC_PROTO_RESULT_STATUS_RESULT = 1;
  CODEC_PROTO_RESULT_STATUS_CODEC_ERROR = 2;
}

// CodecProtoResultEnvelope is the single binary response shape for executable
// protobuf and generated ProtoJSON requests.
message CodecProtoResultEnvelope {
  CodecProtoResultStatus status = 1;
  bytes payload = 2;
}

// CodecPemLabel is the typed protobuf representation of the PEM labels accepted
// by the codec parser.
enum CodecPemLabel {
  CODEC_PEM_LABEL_UNSPECIFIED = 0;
  CODEC_PEM_LABEL_PRIVATE_KEY = 100;
  CODEC_PEM_LABEL_EC_PRIVATE_KEY = 110;
  CODEC_PEM_LABEL_PUBLIC_KEY = 120;
}

message CodecMulticodecPrefixForNameRequest {
  string name = 1;
}

message CodecMulticodecLookupPrefixRequest {
  bytes value = 1;
}

message CodecMulticodecTableRequest {}

message CodecMultikeyParseRequest {
  string multikey = 1;
}

message CodecDagCborVerifyCidRequest {
  string cid = 1;
  bytes payload = 2;
}

// Zero limits select the audited codec defaults. An empty allowed-label list
// selects the default PRIVATE KEY, EC PRIVATE KEY, and PUBLIC KEY set.
message CodecPemDecodeOptions {
  repeated CodecPemLabel allowed_labels = 1;
  uint32 max_input_len = 2;
  uint32 max_der_len = 3;
}

message CodecPemDecodeRequest {
  // PEM may contain private-key material. Bytes avoid long-lived immutable
  // managed strings and let generated hardening wipe the owned request field.
  bytes pem = 1;
  CodecPemDecodeOptions options = 2;
}

// CodecOperationRequest is the single executable protobuf request. Native SDK
// callers continue to use typed methods; binary protobuf and generated
// ProtoJSON adapters select exactly one operation through this oneof. Sparse
// field bands keep related codec families together without creating a second
// out-of-band operation namespace.
message CodecOperationRequest {
  reserved 1 to 999;

  oneof operation {
    // 1000-1999: multicodec table and prefix lookups. The upstream registry
    // is intentionally broad, so keep ample room for validation and lookup
    // operations without mixing them with adjacent codec families.
    CodecMulticodecPrefixForNameRequest multicodec_prefix_for_name = 1000;
    CodecMulticodecLookupPrefixRequest multicodec_lookup_prefix = 1001;
    CodecMulticodecTableRequest multicodec_table = 1002;

    // 2000-2999: multikey parsing and validation.
    CodecMultikeyParseRequest multikey_parse = 2000;

    // 3000-3999: DAG-CBOR and content-addressed canonicalization helpers.
    CodecDagCborVerifyCidRequest dag_cbor_verify_cid = 3000;

    // 4000-4999: PEM armor and DER envelope helpers.
    CodecPemDecodeRequest pem_decode = 4000;
  }
}

// CodecKeyMaterialKind classifies the material described by a multicodec
// table entry. The enum is intentionally small and owned by this package so
// SDKs do not pass ad hoc strings across FFI or RPC boundaries.
enum CodecKeyMaterialKind {
  CODEC_KEY_MATERIAL_KIND_UNSPECIFIED = 0;
  CODEC_KEY_MATERIAL_KIND_PUBLIC_KEY = 1;
  CODEC_KEY_MATERIAL_KIND_PRIVATE_KEY = 2;
  CODEC_KEY_MATERIAL_KIND_SYMMETRIC_KEY = 3;
  CODEC_KEY_MATERIAL_KIND_NOT_KEY = 4;
}

// CodecTag classifies the protocol role of a multicodec table entry.
enum CodecTag {
  CODEC_TAG_UNSPECIFIED = 0;
  CODEC_TAG_ENCRYPTION = 1;
  CODEC_TAG_KEY = 2;
  CODEC_TAG_HASH = 3;
  CODEC_TAG_MULTIHASH = 4;
  CODEC_TAG_MULTIKEY = 5;
}

// CodecMulticodecSpec is the protobuf form of a multicodec table entry.
message CodecMulticodecSpec {
  string name = 1;
  // Raw multicodec varint bytes for callers that need the numeric code
  // encoding independent of any payload.
  bytes code = 2;
  // Prefix bytes to match or prepend on encoded values. For currently
  // supported codecs this is identical to code, but it is kept separate so
  // consumers can use semantic field names without deriving one from the
  // other.
  bytes prefix = 3;
  CodecTag tag = 4;
  CodecKeyMaterialKind key_material_kind = 5;
  uint32 fixed_length = 6;
  bool variable_length = 7;
  string algorithm_name = 8;
}

// CodecMulticodecLookupResult is returned when bytes are matched against the
// supported multicodec prefix table.
message CodecMulticodecLookupResult {
  string name = 1;
  uint32 prefix_length = 2;
  CodecMulticodecSpec metadata = 3;
}

// CodecMulticodecTableResult contains the supported multicodec entries.
message CodecMulticodecTableResult {
  repeated CodecMulticodecSpec entries = 1;
}

// CodecMultikeyParseResult is the binary/protobuf form of multikey parsing.
message CodecMultikeyParseResult {
  string codec_name = 1;
  string algorithm_name = 2;
  bytes public_key = 3;
  uint32 expected_public_key_length = 4;
  bool variable_public_key_length = 5;
}

// CodecDagCborVerifyCidResult contains the deterministic CID verification
// result without requiring callers to parse fixed-shape JSON.
message CodecDagCborVerifyCidResult {
  bool valid = 1;
  string expected_cid = 2;
  string actual_cid = 3;
}

// CodecPemDecodeResult is the binary/protobuf form of PEM armor decoding.
message CodecPemDecodeResult {
  string label = 1;
  // DER may contain private-key material. Receivers that request protobuf PEM
  // decode results are responsible for copying it into their language's
  // sensitive-buffer owner and wiping intermediate protobuf containers as soon
  // as practical.
  bytes der = 2;
}

// CodecBaseEncodingError describes base64, base64url, hex, and generic byte
// encoding failures.
message CodecBaseEncodingError {
  // Reason must be one of the CODEC_ERROR_REASON_BASE_* values.
  CodecErrorReason reason = 1;
}

// CodecPemError describes RFC 7468-style PEM armor boundary and body failures.
message CodecPemError {
  // Reason must be one of the CODEC_ERROR_REASON_PEM_* values.
  CodecErrorReason reason = 1;
}

// CodecMultiformatError describes multibase, multicodec, and multikey
// envelope failures.
message CodecMultiformatError {
  // Reason must be one of the CODEC_ERROR_REASON_MULTIFORMAT_* values.
  CodecErrorReason reason = 1;
}

// CodecCanonicalizationError describes CBOR, DAG-CBOR, JCS, and JSON
// canonicalization failures.
message CodecCanonicalizationError {
  // Reason must be one of the CODEC_ERROR_REASON_CANONICAL_* values.
  CodecErrorReason reason = 1;
}

// CodecBackendError describes serialization, protobuf, dispatch, FFI, WASM,
// and internal failures that are not safe to expose as backend exception text.
message CodecBackendError {
  // Reason must be one of the CODEC_ERROR_REASON_BACKEND_* values.
  CodecErrorReason reason = 1;
}

// CodecBoundaryError describes malformed, oversized, or incomplete caller
// requests. These failures are not backend failures and never contain parser
// or runtime exception text.
message CodecBoundaryError {
  // Reason must be one of the CODEC_ERROR_REASON_BOUNDARY_* values.
  CodecErrorReason reason = 1;
}

// CodecErrorReason is the component-owned reason-code enum for reallyme/codec.
// Values are stable public boundary codes; local parser errors must map into
// one of these before crossing RPC, SDK, FFI, storage, audit, or telemetry
// boundaries. Numeric ranges are intentionally split by codec subpart:
//   100-199: base encodings
//   200-299: PEM armor
//   300-399: multiformats and key envelopes
//   400-499: CBOR/JCS/JSON canonicalization
//   500-599: backend and internal failures
//   600-699: caller-controlled protobuf and ProtoJSON boundary failures
enum CodecErrorReason {
  reserved 112;

  CODEC_ERROR_REASON_UNSPECIFIED = 0;

  // Base encodings and generic byte-envelope limits.
  CODEC_ERROR_REASON_BASE_UNSUPPORTED_CODEC = 100;
  CODEC_ERROR_REASON_BASE_INVALID_ENCODING = 101;
  CODEC_ERROR_REASON_BASE_INVALID_LENGTH = 102;
  CODEC_ERROR_REASON_BASE_INPUT_TOO_LARGE = 103;
  CODEC_ERROR_REASON_BASE_OUTPUT_TOO_LARGE = 104;
  CODEC_ERROR_REASON_BASE_INVALID_BASE64 = 110;
  CODEC_ERROR_REASON_BASE_INVALID_BASE64URL = 111;
  CODEC_ERROR_REASON_BASE_INVALID_HEX = 120;
  CODEC_ERROR_REASON_BASE_NON_CANONICAL_HEX = 121;

  // PEM armor.
  CODEC_ERROR_REASON_PEM_INVALID_BOUNDARY = 200;
  CODEC_ERROR_REASON_PEM_LABEL_MISMATCH = 201;
  CODEC_ERROR_REASON_PEM_UNSUPPORTED_LABEL = 202;
  CODEC_ERROR_REASON_PEM_INVALID_BODY = 203;
  CODEC_ERROR_REASON_PEM_DER_TOO_LARGE = 204;

  // Multiformats and key envelopes.
  CODEC_ERROR_REASON_MULTIFORMAT_INVALID_MULTIBASE_PREFIX = 300;
  CODEC_ERROR_REASON_MULTIFORMAT_INVALID_MULTICODEC_PREFIX = 301;
  CODEC_ERROR_REASON_MULTIFORMAT_UNKNOWN_MULTICODEC = 302;
  CODEC_ERROR_REASON_MULTIFORMAT_INVALID_MULTIKEY = 303;

  // CBOR, DAG-CBOR, JCS, and JSON canonicalization.
  CODEC_ERROR_REASON_CANONICAL_INVALID_CBOR = 400;
  CODEC_ERROR_REASON_CANONICAL_NON_CANONICAL_CBOR = 401;
  CODEC_ERROR_REASON_CANONICAL_INVALID_JSON = 402;
  CODEC_ERROR_REASON_CANONICAL_NON_CANONICAL_JSON = 403;
  CODEC_ERROR_REASON_CANONICAL_INTERNAL = 404;

  // Backend failures.
  CODEC_ERROR_REASON_BACKEND_INTERNAL = 500;

  // Caller-controlled wire-boundary failures.
  CODEC_ERROR_REASON_BOUNDARY_MALFORMED_PROTOBUF = 600;
  CODEC_ERROR_REASON_BOUNDARY_MALFORMED_JSON = 601;
  CODEC_ERROR_REASON_BOUNDARY_RESOURCE_LIMIT_EXCEEDED = 602;
  CODEC_ERROR_REASON_BOUNDARY_MISSING_OPERATION = 603;
}
